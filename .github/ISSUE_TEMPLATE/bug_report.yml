name: Bug report
description: Report something that doesn't work as expected
labels: ["bug"]
body:
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: e.g. 15.4
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`
      placeholder: e.g. v22.11.0
    validations:
      required: true
  - type: dropdown
    id: backend
    attributes:
      label: Backend in use
      options:
        - "OSM/OSRM (no APPLE_MAPS_AUTH_TOKEN set)"
        - "Apple Maps Server API (APPLE_MAPS_AUTH_TOKEN set)"
        - "Not applicable / URL-scheme tool only"
    validations:
      required: true
  - type: textarea
    id: call
    attributes:
      label: Tool call
      description: The exact tool name and arguments you invoked.
      render: json
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include the error message or unexpected output. Do NOT paste your JWT or access token.
    validations:
      required: true
